services:
  postgres:
    image: postgres:18-alpine
    container_name: ino-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: ino
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ino']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
